name: Trigger JitPack API Build

on:
  push:
    branches:
      - main
    tags:
      - "*"
    paths:
      - "modules/api/**"
      - ".github/workflows/publish-api.yml"
      - "jitpack.yml"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve JitPack target version
        id: vars
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=main-SNAPSHOT" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger JitPack build
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          URL="https://jitpack.io/com/github/MCAerogel/Aerogel/${VERSION}/build.log"
          HTTP_CODE="$(curl --silent --show-error --location \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 5 \
            --retry-delay 5 \
            --retry-all-errors \
            --output /dev/null \
            --write-out "%{http_code}" \
            "$URL" || true)"

          echo "JitPack build trigger response HTTP $HTTP_CODE: $URL (non-blocking)"
