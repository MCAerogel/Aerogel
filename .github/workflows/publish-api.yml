name: Trigger JitPack API Build

on:
  push:
    branches:
      - main
    tags:
      - "*"
    paths:
      - "modules/api/**"
      - ".github/workflows/publish-api.yml"
      - "jitpack.yml"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve JitPack target version
        id: vars
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=main-SNAPSHOT" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger JitPack build
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          URL="https://jitpack.io/com/github/MCAerogel/Aerogel/api/${VERSION}/api-${VERSION}.pom"
          curl --fail --show-error --location \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 5 \
            --retry-delay 5 \
            --retry-all-errors \
            "$URL" || {
              echo "JitPack artifact endpoint did not respond cleanly (non-blocking): $URL"
              exit 0
            }
