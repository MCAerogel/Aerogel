# Authentication mode
# false: offline mode (no Mojang auth)
# true: online mode (Mojang auth + skin properties)
online-mode=true

# Tick rate cap
# -1: uncapped
# >0: capped (supports decimal, e.g. 20.0)
max-tps=20.0

# Maximum concurrent players (status response + dashboard upper bound)
# valid value: >= 1
max-players=20

# Global time scale
# 1.0 = normal, <1.0 = slower, >1.0 = faster
# valid value: > 0
time-scale=1.0

# Player client time scale (via ticking_state packet)
# 1.0 = normal, lower values are slower
# valid value: (0, 1]
player-time-scale=1.0

# Hard cap for per-player view distance in chunk radius
# clamped to [2, 32]
max-view-distance-chunks=32

# Hard cap for per-player simulation distance in chunk radius
# clamped to [2, 32]
# effective simulation distance is min(view-distance, this value)
max-simulation-distance-chunks=16

# Chunk generation worker threads
# 0: auto (use max logical cores detected by OS/JVM)
# >0: fixed worker thread count
chunk-worker-threads=0

# zlib compression level [0..9]
# 1 is recommended for low server CPU and fast chunk delivery.
compression-level=1

# Packet compression threshold (bytes)
# -1: disable compression
# 0+: packets >= threshold are compressed
compression-threshold=1024

# Separate level for chunk packets (clientbound level_chunk_with_light)
# -1 disables chunk compression (fastest CPU path, higher bandwidth).
compression-chunk-level=1

# Default game mode for newly joined players
# 0=survival, 1=creative, 2=adventure, 3=spectator
# or use names: survival|creative|adventure|spectator
default-gamemode=creative

# Optional. If omitted, default is minecraft:overworld.
# world.default=minecraft:overworld

# Legacy default seed key (applies to overworld if set)
# world.seed=12345

# Per-world manual seeds. If a key is missing, that world uses a random seed.
world.seed.minecraft:overworld=1212
# world.seed.minecraft:the_nether=67890
# world.seed.minecraft:the_end=13579
